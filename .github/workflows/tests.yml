name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew :opendisplay-java:test --tests 'org.opendisplay.ProtocolTest'
