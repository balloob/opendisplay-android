name: Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          # Generate numeric version code from semver (1.2.3 -> 10203)
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            -PbuildVersionName=${{ steps.version.outputs.name }} \
            -PbuildVersionCode=${{ steps.version.outputs.code }}

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          $ANDROID_HOME/build-tools/28.0.3/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release.apk
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks release.keystore --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" --ks-key-alias "$KEY_ALIAS" \
            app/build/outputs/apk/release/app-release.apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            app/build/outputs/apk/release/app-release.apk \
            --clobber
