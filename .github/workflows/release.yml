name: Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-28"

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          # Generate numeric version code from semver (1.2.3 -> 10203)
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            -PbuildVersionName=${{ steps.version.outputs.name }} \
            -PbuildVersionCode=${{ steps.version.outputs.code }}

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            --clobber
