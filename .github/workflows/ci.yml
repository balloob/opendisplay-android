name: Test

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  java-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: balloob/py-opendisplay
          ref: wifi-server
          path: py-opendisplay

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6

      - name: Install py-opendisplay dependencies
        working-directory: py-opendisplay
        run: uv sync

      - name: Run Java test suite
        env:
          PY_OPENDISPLAY_DIR: ${{ github.workspace }}/py-opendisplay
        run: |
          chmod +x gradlew
          ./gradlew :opendisplay-java:test
